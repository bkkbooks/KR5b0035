body:
  text: 太一救苦護身妙經爾時元始天尊在玄景之上清微天中九色玉堂昇七寳座放大光明普集萬靈與天教化十方天尊道君老君帝君元君文人聖人萬萬仙衆俱來詣座聽宣妙法於是梵王稱善帝釋欣歌仙樂自響隨光而至是時太上老君身離玉座歩躡蓮花眞人侍於左右玉女扶於曳裾至天尊前奏曰臣等蒙師開化受福天堂施功無極恩不可量臣觀三界之中苦海之内無量衆生橫遭厄難罪綱牽纒異類羣情難逃生化臣不可住於太清欲仗威光分身三界救度羣情惟望至尊觀心慈慜於是元始天尊微起法身告老君曰善哉善哉汝離玉座驚怖萬天救苦救生不須汝言可還座中吾爲宣說天尊曰萬物吾生萬靈吾化遭苦遭厄當須救之不須汝威力化身救度此東方長樂世界有大慈仁者太一救苦天尊化身如恒沙數物隨聲應或住天宫或降人間或居地獄或攝羣邪或爲仙童玉女或爲帝君聖人或爲天尊眞人或爲金剛神王或爲魔王力士或爲天師道士或爲皇人老君或爲天醫功曹或爲男子女子或爲文武官宰或爲都大元帥或爲教師禪師或爲風師雨師神通無量功行無窮尋聲救苦應物隨機今告汝知老君重奏曰此之威神有無量變化如何得至我師御前天尊告老君曰汝可舉聲唱太一之名使仙官齊詠自然應化現身於是老君衆仙等遵其教㫖齊聲稱詠太一救苦天尊之名忽見帝君班中有童子一人歩歩躡於蓮花稽首至天尊前奏曰臣乃太一爲我師開化說法臣集相聚形聽宣妙音天中快樂一時地下動經萬劫三界之中羣生受苦髙聲呌喚苦哉苦哉旋遶天尊禮拜俯伏乞下天關於是衆仙見童子奏對泣涙滴衣哽噎嘆言天上快樂地下受災輪廻報對何時清閑天尊吿太一曰汝行願慈悲衆生受苦依汝行願分身救之童子喜笑再拜而退衆仙觀見童子化一天尊足躡蓮花圓光照耀手執柳枝淨水九頭獅子左右從隨乘空而去又見天尊化一帝君足躡蓮花手執如意圓光照耀九頭獅子左右從隨乗空而去又見帝君化一眞人足躡蓮花手放神光上通九天下通九地九頭獅子左右從隨乗空而去又見眞人化一女子身著火錦櫬衣披髪跣足躡於蓮花手執金劒圓光照耀九頭獅子口吐火熖遶於身形乗空而去老君奏天尊曰此聖威德變化救生從何而有甚劫修行惟願應機爲衆宣説天尊曰此聖在天呼爲太福神在世呼爲大慈仁者在地獄呼爲日耀帝君在外道攝邪呼爲獅子明王在水府呼爲洞淵帝君汝是吾之氣吾是汝之根汝知吾知此是九陽之精甚靈甚靈汝可袐之不可盡述是時老君聞天尊言閉目定神彈指叩頭呪曰元元之祖氣妙化九陽精威德布十方恍恍現其眞三九揚風出徘徊離始青恭敬生瓊液奉之免渴饑萬靈當信禮八苦不能隨積行持科戒提攜證玉京爾時天尊重告老君及諸仙曰若有衆生時遭疾疫病痛纒綿可以焚香念誦聖號看轉此經疾患退散克獲安寜若有衆生求官覔職姦佞妄生但當念誦聖號看轉此經自然嫉妬不生髙遷禄秩若有衆生泛渉江海波浪所驚魚龍欲傷可以存思念誦聖號便得逹岸無有害傷若有衆生值雷霹靂風雨驚怖但當存思念誦聖號神氣爽清魂魄不動若有衆生父母師資六親不和兄弟乖踈但當存思念誦聖號者轉此經自感六親和睦父慈子孝兄友弟恭若有帝王國主朝生叛臣兵火作亂風雨不調萬民塗炭怨地尤天但當持齋念誦看轉此經風雨便得順時叛臣敗露國泰民安若有衆生爲邪精鬼賊妄來所傷但當存思念誦聖號妖魅自止鬼賊滅亡若有衆生山林徃來被蟲蛇禽獸奔奪所傷但當存思念誦聖號禽蟲自退不敢來害若有女人懷受胎孕臨産艱難但當存思念誦聖號自感眞氣佑護無痛無傷便生智慧之男有相之女六根具足母子團圓若有男子女子慕道求仙在家出家養性養命但當存思念誦聖號看轉此經便得功行圎滿白日昇天若有衆生頻遭枷鎻牢獄之中呻吟難訴但當存思念誦聖號便得解脱出離囹圄若有衆生爲七祖九先門人同學夫妻男女身砓之後流滯寒庭未得託生但當存思念誦聖號自然岀離隂境便得生天若有衆生爲寃家牽引後連相纏但當存思念誦聖號寛家解釋後連斷除於是天尊告老君曰此聖最尊最貴最聖最靈每月三九曰多降人間常於淨室中焚香禮拜柳枝淨水時花藥苗如法供養自然壽滿一百二十五福常臻八難逺離切忌竃下灰燼石榴穢物此爲不潔勿令觸之爾時天尊説經畢竟大會之中羣仙唱善獅子能語鳯凰能言魚龍成人枯朽還生蠢動含情福資皆徧巍巍堂堂皆得昇仙於是道君老君無量衆眞同聲讚嘆今聞妙音大獲利益奉辭而退太一救苦護身妙經終
