front:
  text: 爾時元始天尊在玄景之上淸微天中九色玉堂昇七寶座放大光明普集萬靈與天教化十方天尊道君老君帝君元君丈人聖人萬萬仙眾俱來詣座聽宣妙法於是梵王稱善帝釋欣歌仙樂自響隨光而至是時太上老君身離玉座步躡蓮花眞人侍於左右玉女扶於曵裙至天尊前奏曰臣等䝉師開化受福天堂施功無極恩不可量臣觀三界之中苦海之內無量眾生橫遭厄難罪網牽纒異類羣情難逃生化臣不可住於太淸欲仗威光分身三界救度羣情惟望至尊觀心慈慜於是元始天尊微起法身告老君曰善哉善哉汝離玉座驚怖萬天救苦救生不須汝言可還座中吾爲宣說天尊曰萬物吾生萬靈吾化遭苦遭厄當須救之不須汝威力化身救度此東方長樂世界有大慈仁者太一救苦天尊化身如恆沙數物隨聲應或住天宮或降人間或居地獄或攝羣邪或爲仙童玉女或爲帝君聖人或爲天尊眞人或爲金剛神王或爲魔王力士或爲天師道士或爲皇人老君或爲天醫功曹或爲男子女子或爲文武官宰或爲都大元帥或爲教師禪師或爲風師雨師神通無量功行無窮尋聲救苦應物隨機今告汝知老君重奏曰此之威神有無量變化如何得至我師御前天尊告老君曰汝可舉聲唱太一之名使仙官齊詠自然應化現身於是老君眾仙等遵其教旨齊聲稱詠太一救苦天尊之名忽見帝君班中有童子一人步步躡於蓮花稽首至天尊前奏曰臣乃太一爲我師開化說法臣集相聚形聽宣妙音天中快樂一時地下動經萬刦三界之中羣生受苦高聲呌喚苦哉苦哉旋遶天尊禮拜俯伏乞下天宫於是眾仙見童子奏對泣涙滴衣哽噎嘆言天上快樂地下受災輪迴報對何時淸閑天尊吿太一曰汝行願慈悲眾生受苦依汝行願分身救之童子喜笑再拜而退眾仙觀見童子化一天尊足躡蓮花圓光照耀手執柳枝凈水九頭獅子左右從隨乘空而去又見天尊化一帝君足躡蓮花手執如意圓光照耀九頭獅子左右從隨乘空而去又見帝君化一眞人足躡蓮花手放神光上通九天下通九地九頭獅子左右從隨乘空而去又見眞人化一女子身著火錦襯衣披髪跣足躡於蓮花手執金劒圓光照耀九頭獅子口吐火熖遶於身形乘空而去老君奏天尊曰此聖威德變化救生從何而有甚刦修行惟願應機爲眾宣說天尊曰此聖在天呼爲太一福神在世呼爲大慈仁者在地獄呼爲日耀帝君在外道攝邪呼爲獅子明王在水府呼爲洞淵帝君汝是吾之氣吾是汝之根汝知吾知此是九陽之精甚靈甚靈汝可祕之不可盡述是時老君聞天尊言閉目定神彈指叩頭咒曰元元之祖氣妙化九陽精威德布十方
