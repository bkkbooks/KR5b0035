body:
  text: 恍恍現其眞三九揚風出徘徊離始靑恭敬生瓊液奉之免渴饑萬靈當信禮八苦不能隨積行持科戒提攜證玉京爾時天尊重告老君及諸仙曰若有眾生時遭疾疫病痛纒綿可以焚香念誦聖號看轉此經疾患退散克獲安甯若有眾生求官覓職姦佞妄生但當念誦聖號看轉此經自然嫉妬不生高遷祿秩若有眾生泛涉江海波浪所驚魚龍欲傷可以存思念誦聖號便得達岸無有害傷若有眾生值雷霹靂風雨驚怖但當存思念誦聖號神氣爽淸魂魄不動若有眾生父母師資六親不和兄弟乖疎但當存思念誦聖號看轉此經自感六親和睦父慈子孝兄友弟恭若有帝王國主朝生叛臣兵火作亂風雨不調萬民塗炭怨地尤天但當持齋念誦看轉此經風雨便得順時叛臣敗露國泰民安若有眾生爲邪精鬼賊妄來所傷但當存思念誦聖號妖魅自止鬼賊滅亡若有眾生山林往來被蟲蛇禽獸奔奪所傷但當存思念誦聖號禽蟲自退不敢來害若有女人懷受胎孕臨產艱難但當存思念誦聖號自感眞氣佑護無痛無傷便生智慧之男有相之女六根具足母子團圓若有男子女子慕道求仙在家出家養性養命但當存思念誦聖號看轉此經便得功行圓滿白日昇天若有眾生頻遭枷鎻牢獄之中呻吟難訢但當存思念誦聖號便得解脫出離囹圄若有眾生爲七祖九先門人同學夫妻男女身殁之後流滯寒庭未得託生但當存思念誦聖號自然出離陰境便得生天若有眾生爲𡨚家牽引復連相纏但當存思念誦聖號𡨚家解釋復連斷除於是天尊告老君曰此聖最尊最貴最聖最靈每月三九日多降人間常於淨室中焚香禮拜柳枝淨水時花藥苗如法供養自然夀滿一百二十五福常臻八難遠離切忌竈下灰燼石榴穢物此爲不潔勿令觸之爾時天尊說經畢竟大會之中羣仙唱善獅子能語鳳凰能言魚龍成人枯朽還生蠢動含情福資皆徧巍巍堂堂皆得昇仙於是道君老君無量眾眞同聲讚嘆今聞妙音大獲利益奉辭而退
  hash: sha256:b1fd602c9a68d2d9c7ee7ba93d5109d1d9250340196eb19ac8efb8625a6f7ef4
